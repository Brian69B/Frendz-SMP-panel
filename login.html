<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FriendzSMP — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0e1a;
    --surface:   #111827;
    --border:    #1f2d45;
    --accent:    #3b82f6;
    --accent2:   #6366f1;
    --green:     #22c55e;
    --text:      #f1f5f9;
    --muted:     #64748b;
    --danger:    #ef4444;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* animated background */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }

  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,.15) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(59,130,246,.10) 0%, transparent 60%);
  }

  /* particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .particle {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: var(--accent); opacity: 0;
    animation: float var(--dur) var(--delay) infinite ease-in-out;
  }
  @keyframes float {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: .6; }
    90%  { opacity: .6; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }

  /* layout */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
  }

  /* logo / brand */
  .brand {
    text-align: center; margin-bottom: 2.5rem;
  }
  .brand-icon {
    width: 72px; height: 72px; margin: 0 auto 1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    box-shadow: 0 0 40px rgba(99,102,241,.4);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(99,102,241,.3); }
    50%      { box-shadow: 0 0 60px rgba(99,102,241,.6); }
  }
  .brand h1 {
    font-size: 1.75rem; font-weight: 800; letter-spacing: -.5px;
    background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .brand p {
    color: var(--muted); font-size: .875rem; margin-top: .35rem;
  }

  /* card */
  .card {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 25px 60px rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
  }

  .card h2 {
    font-size: 1.25rem; font-weight: 700; margin-bottom: .4rem;
  }
  .card .subtitle {
    color: var(--muted); font-size: .85rem; margin-bottom: 2rem;
  }

  .field { margin-bottom: 1.25rem; }
  .field label {
    display: block; font-size: .8rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: .5rem;
  }
  .field-wrap {
    position: relative;
  }
  .field-wrap .icon {
    position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 1rem; pointer-events: none;
  }
  .field input {
    width: 100%; padding: .75rem .9rem .75rem 2.5rem;
    background: #0d1525; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: .95rem; font-family: inherit;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,.15);
  }
  .field input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%; padding: .85rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #fff; font-size: 1rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(59,130,246,.3);
    margin-top: .5rem;
  }
  .btn-login:hover { opacity: .9; box-shadow: 0 6px 30px rgba(59,130,246,.45); }
  .btn-login:active { transform: scale(.98); }
  .btn-login.loading { opacity: .7; pointer-events: none; }

  .error-msg {
    display: none; margin-top: 1rem;
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px; padding: .65rem .9rem;
    color: #fca5a5; font-size: .85rem; text-align: center;
  }
  .error-msg.show { display: block; }

  /* server status badge */
  .status-badge {
    display: flex; align-items: center; gap: .5rem;
    margin-top: 2rem; justify-content: center;
    font-size: .8rem; color: var(--muted);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* footer */
  .footer {
    position: fixed; bottom: 1.5rem; left: 0; right: 0;
    text-align: center; color: var(--muted); font-size: .75rem; z-index: 1;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="page">
  <div class="brand">
    <div class="brand-icon">⛏</div>
    <h1>FriendzSMP</h1>
    <p>Server Control Panel</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access the server dashboard</p>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field">
        <label>Username</label>
        <div class="field-wrap">
          <span class="icon">👤</span>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required/>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required/>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="status-badge">
      <div class="status-dot"></div>
      FriendzSMP · Minecraft 1.21.11 · Fabric + Geyser
    </div>
  </div>
</div>

<div class="footer">FriendzSMP &copy; 2025 &mdash; Powered by Geyser &amp; Floodgate</div>

<script>
// Generate floating particles
const container = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `left:${Math.random()*100}%;--dur:${6+Math.random()*10}s;--delay:${Math.random()*8}s`;
  container.appendChild(p);
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  btn.textContent = 'Signing in…';
  btn.classList.add('loading');
  err.classList.remove('show');

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = '✓ Success!';
      setTimeout(() => { window.location.href = '/'; }, 400);
    } else {
      err.textContent = data.msg || 'Invalid credentials';
      err.classList.add('show');
      btn.textContent = 'Sign In';
      btn.classList.remove('loading');
    }
  } catch {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
    btn.textContent = 'Sign In';
    btn.classList.remove('loading');
  }
}
</script>
</body>
</html>
